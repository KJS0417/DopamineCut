<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DopamineCut Community</title>
    <style>
        :root {
            --primary: #4ade80; /* 도파민 디톡스 느낌의 그린 */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 800px; width: 100%; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary); font-size: 2rem; }

        /* --- 글쓰기 영역 --- */
        .write-section {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 10px;
            resize: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .write-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .user-info-input input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            margin-right: 5px;
        }

        button {
            background: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.8; }

        /* --- 피드 영역 --- */
        .feed-item {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 5px solid transparent;
            transition: 0.3s;
        }

        /* 랭킹에 따른 테두리 강조 */
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #2d2613, #1e293b); }
        .rank-2 { border-left-color: #94a3b8; }
        .rank-3 { border-left-color: #b45309; }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .profile-emoji {
            font-size: 2rem;
            background: #334155;
            padding: 5px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nickname { font-weight: bold; }
        
        /* 🔥 중요: 점수에 따른 동적 크기 조절 타겟 */
        .post-content {
            line-height: 1.5;
            word-break: break-all;
        }

        .score-tag {
            font-size: 0.8rem;
            background: rgba(74, 222, 128, 0.2);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🛡️ DopamineCut Community</h1>
            <p>앱에서 측정한 점수로 커뮤니티의 권력을 쟁취하세요!</p>
        </header>

        <section class="write-section">
            <textarea id="postInput" placeholder="오늘의 디톡스 경험을 공유해 주세요..."></textarea>
            <div class="write-bottom">
                <div class="user-info-input">
                    <input type="text" id="nickInput" placeholder="닉네임" maxlength="8">
                    <input type="number" id="scoreInput" placeholder="도파민 점수(0~100)" max="100">
                </div>
                <button onclick="savePost()">게시하기</button>
            </div>
        </section>

        <div id="feedArea">
            </div>
    </div>

    <script>
        // 이모지 데이터 (점수/순위별로 꾸며줄 용도)
        const emojis = ["🔥", "🛡️", "🌱", "💎", "👑", "⚡"];

        // 1. 게시물 저장 함수
        function savePost() {
            const text = document.getElementById('postInput').value;
            const nickname = document.getElementById('nickInput').value;
            const score = parseInt(document.getElementById('scoreInput').value);

            if (!text || !nickname || isNaN(score)) {
                alert("모든 내용을 입력해 주세요!");
                return;
            }

            const newPost = {
                id: Date.now(),
                nickname,
                score,
                text,
                emoji: emojis[Math.floor(Math.random() * emojis.length)],
                date: new Date().toLocaleString()
            };

            // 기존 데이터 가져오기
            const posts = JSON.parse(localStorage.getItem('posts') || '[]');
            posts.unshift(newPost); // 최신글이 위로
            localStorage.setItem('posts', JSON.stringify(posts));

            // 입력창 초기화
            document.getElementById('postInput').value = '';
            renderFeed();
        }

        // 2. 피드 렌더링 함수 (점수 기반 랭킹 적용)
        function renderFeed() {
            const feedArea = document.getElementById('feedArea');
            const posts = JSON.parse(localStorage.getItem('posts') || '[]');

            // 점수 순으로 랭킹 정렬 (점수가 높을수록 1위)
            const sortedPosts = [...posts].sort((a, b) => b.score - a.score);

            feedArea.innerHTML = posts.map(post => {
                // 랭킹 찾기 (1위, 2위, 3위 등)
                const rankIndex = sortedPosts.findIndex(p => p.id === post.id) + 1;
                
                // 🔥 로직: 순위에 따른 폰트 크기 계산 (1위는 크게, 나머지는 기본)
                // 1위: 2rem, 2위: 1.5rem, 3위: 1.2rem, 나머지: 1rem
                let fontSize = "1rem";
                if(rankIndex === 1) fontSize = "2.2rem";
                else if(rankIndex === 2) fontSize = "1.6rem";
                else if(rankIndex === 3) fontSize = "1.3rem";

                // 랭킹 클래스
                let rankClass = "";
                if(rankIndex <= 3) rankClass = `rank-${rankIndex}`;

                return `
                    <div class="feed-item ${rankClass}">
                        <div class="profile">
                            <div class="profile-emoji">${post.emoji}</div>
                            <div>
                                <div class="nickname">${post.nickname} <span class="score-tag">Score: ${post.score}</span></div>
                                <div style="font-size: 0.7rem; color: #64748b;">${rankIndex}위 · ${post.date}</div>
                            </div>
                        </div>
                        <div class="post-content" style="font-size: ${fontSize}; font-weight: ${rankIndex <= 3 ? 'bold' : 'normal'}">
                            ${post.text}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 초기 실행
        renderFeed();
    </script>
</body>
</html>

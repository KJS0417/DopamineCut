<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DopamineCut Community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Dopamine<span>Cut</span></div>
        <nav class="nav-links">
            <a href="#" class="active">커뮤니티</a>
            <a href="#">내 통계 (앱 연동)</a>
        </nav>
    </header>

    <main class="container">
        
        <aside class="sidebar">
            <div class="profile-card">
                <div class="avatar"></div>
                <h3>도파민디톡서_123</h3>
                <p class="status">오늘 숏폼 차단 중 🛡️</p>
                <hr>
                <div class="app-stats">
                    <div class="stat-item">
                        <span class="label">오늘 절약한 시간</span>
                        <span class="value">1시간 45분</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">디톡스 연속 일수</span>
                        <span class="value">7일차</span>
                    </div>
                </div>
            </div>
        </aside>

        <section class="feed-section">
            
            <div class="write-box">
                <textarea placeholder="오늘의 디톡스 다짐이나 성과를 팀원들과 공유해보세요!"></textarea>
                <div class="write-controls">
                    <button class="btn-secondary">📸 사진 추가</button>
                    <button class="btn-primary">게시하기</button>
                </div>
            </div>

            <div class="feed-list">
                
                <article class="post-card">
                    <div class="post-header">
                        <div class="post-user-info">
                            <div class="mini-avatar"></div>
                            <div>
                                <h4 class="username">갓생살자</h4>
                                <span class="time">방금 전</span>
                            </div>
                        </div>
                        <span class="badge badge-success">챌린지 성공</span>
                    </div>
                    <p class="post-content">
                        오늘 인스타 릴스 유혹 진짜 많았는데, DopamineCut 앱이 딱 막아줘서 전공 책 50페이지 읽었습니다! 다들 화이팅입니다!! 🔥
                    </p>
                    <div class="post-actions">
                        <button class="action-btn">👍 좋아요 12</button>
                        <button class="action-btn">💬 댓글 4</button>
                    </div>
                </article>

                <article class="post-card">
                    <div class="post-header">
                        <div class="post-user-info">
                            <div class="mini-avatar"></div>
                            <div>
                                <h4 class="username">쇼츠중독탈출</h4>
                                <span class="time">2시간 전</span>
                            </div>
                        </div>
                        <span class="badge badge-warning">위기 극복</span>
                    </div>
                    <p class="post-content">
                        유튜브 쇼츠 마려울 때마다 커뮤니티 와서 다른 분들 글 보며 참는 중입니다... 앱 통계 보니까 이번 주 벌써 5시간 아꼈네요. 효율 대박입니다.
                    </p>
                    <div class="post-actions">
                        <button class="action-btn">👍 좋아요 8</button>
                        <button class="action-btn">💬 댓글 2</button>
                    </div>
                </article>

            </div>
        </section>

    </main>

</body>
</html>
